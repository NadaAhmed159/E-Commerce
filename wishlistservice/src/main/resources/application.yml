server:
  port: 8085  # user-service=8081 | product-service=8082 | cart-service=8083 | wishlist=8085

spring:
  application:
    name: wishlist-service   # ← Eureka registers with this name

# ─── MySQL DataSource ─────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wishlist_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:0000}
    driver-class-name: com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# ─── JWT — same secret as all other services ──────────────────────────────────
jwt:
  secret: ${JWT_SECRET:E-commerceFreshCart-WebSite-SecretKey}
  expiration: 600000  # 10 minutes — same as cart-service

# ─── Eureka Service Discovery — same pattern as cart-service ──────────────────
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# ─── OpenFeign — Inter-Service Communication with product-service ──────────────
#   Feign resolves "product-service" via Eureka + LoadBalancer automatically.
#   The name here MUST match spring.application.name in product-service's yml.
spring.cloud:
  openfeign:
    client:
      config:
        product-service:          # ← matches spring.application.name of productservice
          connectTimeout: 5000
          readTimeout: 5000
          loggerLevel: basic      # use FULL for debugging

# ─── Management ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.ecommerce.wishlistservice: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG