  # ── Infrastructure ──────────────────
  eureka-server:
    build: ./eurekaserver
    ports: ["8761:8761"]

  api-gateway:
    build: ./apigateway
    ports: ["8080:8080"]
    depends_on: [eureka-server]
    environment:
      EUREKA_HOST: eureka-server # ← add this
      EUREKA_PORT: 8761 # ← add this

  # ── Business Services ───────────────
  user-service:
    build: ./userservice
    ports: ["8081:8081"]
    depends_on:
        users-db:
          condition: service_healthy
        eureka-server:           
          condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://users-db:3306/users_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
  product-service:
    build: ./productservice
    ports: ["8082:8082"]
    depends_on:
        products-db:
          condition: service_healthy
        eureka-server:          
          condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://products-db:3306/products_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_HOST: eureka-server 
      EUREKA_PORT: 8761
      
