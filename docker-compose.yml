version: "3.8"

services:
  # ── Databases ──────────────────────

  users-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports: ["3307:3306"]
    volumes:
      - users-data:/var/lib/mysql
    healthcheck:                                    
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
  products-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products_db
    ports: ["3308:3306"]
    volumes:
      - products-data:/var/lib/mysql
    healthcheck:                                     
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

